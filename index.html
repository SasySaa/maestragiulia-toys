<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Vocabulary Board</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; }

    .toy-card {
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .toy-card:hover {
      transform: scale(1.06) translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }
    .toy-card:active {
      transform: scale(0.97);
    }

    .toy-card.speaking {
      animation: wiggle 0.5s ease;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) scale(1.06); }
      25% { transform: rotate(-3deg) scale(1.08); }
      75% { transform: rotate(3deg) scale(1.08); }
    }

    .sound-wave {
      position: absolute;
      top: 8px; right: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .speaking .sound-wave { opacity: 1; }

    @keyframes float-in {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toy-card { animation: float-in 0.4s ease both; }

    .stars {
      position: fixed;
      pointer-events: none;
      z-index: 50;
    }
    .star-particle {
      position: absolute;
      font-size: 24px;
      animation: star-fly 0.8s ease-out forwards;
    }
    @keyframes star-fly {
      0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #FFF5F5 0%, #FEF3E2 25%, #F0FFF4 50%, #EBF8FF 75%, #FAF5FF 100%);">
   <header class="text-center pt-6 pb-2 px-4">
    <h1 id="pageTitle" class="text-4xl md:text-5xl font-bold" style="color: #7C5CBF;">🧸 My Toys 🎈</h1>
    <p class="text-lg mt-1 font-medium" style="color: #B08DC4;">Tap a toy to hear its name!</p>
   </header>
   <main class="max-w-5xl mx-auto px-4 pb-8">
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-5"></div>
   </main>
  </div>
  <script>
    const toys = [
      { name: "Doll", emoji: "🪆", bg: "#FFD6E0", border: "#FFB3C6" },
      { name: "Car", emoji: "🚗", bg: "#FFE0B2", border: "#FFCC80" },
      { name: "Robot", emoji: "🤖", bg: "#C8E6C9", border: "#A5D6A7" },
      { name: "Teddy Bear", emoji: "🧸", bg: "#FFF9C4", border: "#FFF176" },
      { name: "Video Game", emoji: "🎮", bg: "#BBDEFB", border: "#90CAF9" },
      { name: "Bike", emoji: "🚲", bg: "#E1BEE7", border: "#CE93D8" },
      { name: "Train", emoji: "🚂", bg: "#B2EBF2", border: "#80DEEA" },
      { name: "Scooter", emoji: "🛴", bg: "#F8BBD0", border: "#F48FB1" },
      { name: "Kite", emoji: "🪁", bg: "#DCEDC8", border: "#C5E1A5" },
      { name: "Ball", emoji: "⚽", bg: "#D1C4E9", border: "#B39DDB" }
    ];

    const grid = document.getElementById('grid');

    toys.forEach((toy, i) => {
      const card = document.createElement('div');
      card.className = 'toy-card relative rounded-3xl flex flex-col items-center justify-center p-4 md:p-5';
      card.style.cssText = `background: ${toy.bg}; border: 3px solid ${toy.border}; animation-delay: ${i * 0.06}s;`;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `Listen to ${toy.name}`);
      card.setAttribute('tabindex', '0');
      card.innerHTML = `
        <div class="sound-wave"><i data-lucide="volume-2" style="width:18px;height:18px;color:${toy.border}"></i></div>
        <span class="text-6xl md:text-7xl leading-none mb-3 select-none">${toy.emoji}</span>
        <span class="text-lg md:text-xl font-bold tracking-wide select-none" style="color: #5A4478;">${toy.name}</span>
      `;

      const speak = () => {
        card.classList.remove('speaking');
        void card.offsetWidth;
        card.classList.add('speaking');
        spawnStars(card);

        const utter = new SpeechSynthesisUtterance(toy.name);
        utter.rate = 0.85;
        utter.pitch = 1.2;
        utter.lang = 'en-US';
        utter.onend = () => card.classList.remove('speaking');
        speechSynthesis.cancel();
        speechSynthesis.speak(utter);
      };

      card.addEventListener('click', speak);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); speak(); } });
      grid.appendChild(card);
    });

    function spawnStars(el) {
      const rect = el.getBoundingClientRect();
      const container = document.createElement('div');
      container.className = 'stars';
      container.style.left = rect.left + rect.width / 2 + 'px';
      container.style.top = rect.top + 'px';
      const emojis = ['⭐', '✨', '🌟', '💫'];
      for (let i = 0; i < 6; i++) {
        const s = document.createElement('span');
        s.className = 'star-particle';
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.setProperty('--tx', (Math.random() - 0.5) * 120 + 'px');
        s.style.setProperty('--ty', -40 - Math.random() * 80 + 'px');
        s.style.left = (Math.random() - 0.5) * 40 + 'px';
        container.appendChild(s);
      }
      document.body.appendChild(container);
      setTimeout(() => container.remove(), 900);
    }

    lucide.createIcons();

    // Element SDK
    const defaultConfig = {
      page_title: "My Toys",
      background_color: "#FFF5F5",
      card_text_color: "#5A4478",
      title_color: "#7C5CBF",
      subtitle_color: "#B08DC4",
      font_family: "Fredoka",
      font_size: 16
    };

    function applyConfig(config) {
      const title = document.getElementById('pageTitle');
      const t = config.page_title || defaultConfig.page_title;
      title.textContent = `🧸 ${t} 🎈`;
      title.style.color = config.title_color || defaultConfig.title_color;

      document.querySelector('header p').style.color = config.subtitle_color || defaultConfig.subtitle_color;

      const font = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;
      document.body.style.fontFamily = `${font}, Fredoka, sans-serif`;

      title.style.fontSize = `${baseSize * 2.8}px`;
      document.querySelector('header p').style.fontSize = `${baseSize * 1.1}px`;

      const textColor = config.card_text_color || defaultConfig.card_text_color;
      document.querySelectorAll('.toy-card span:last-child').forEach(el => {
        el.style.color = textColor;
        el.style.fontSize = `${baseSize * 1.2}px`;
      });
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.title_color || defaultConfig.title_color, set: v => { config.title_color = v; window.elementSdk.setConfig({ title_color: v }); } },
          { get: () => config.subtitle_color || defaultConfig.subtitle_color, set: v => { config.subtitle_color = v; window.elementSdk.setConfig({ subtitle_color: v }); } },
          { get: () => config.card_text_color || defaultConfig.card_text_color, set: v => { config.card_text_color = v; window.elementSdk.setConfig({ card_text_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ["page_title", config.page_title || defaultConfig.page_title]
      ])
    });
  </script>

</html>
